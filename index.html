<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Сменное задание — Плиссе</title>
  <style>
    @page { size: A4 portrait; margin: 7mm; }

    :root{
      --bg:#f3f5f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#d7dee8;
      --head:#1f2937;
      --headText:#ffffff;

      --soft:#f9fafb;

      --print-title-size:28px;

    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{-webkit-text-size-adjust:100%;text-size-adjust:100%}

    body{margin:0;font-family:Arial, Helvetica, sans-serif;color:var(--text);background:var(--bg);font-size:14px}

    header{max-width:1180px;margin:0 auto;padding:18px 18px 14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:flex-start;background:transparent;border-bottom:0}

    h1{margin:0;font-size:24px;line-height:1.2;font-weight:800;color:var(--text)}

    .job-date-input{width:155px;display:inline-block;text-align:center;font-size:inherit;font-weight:inherit;font-family:inherit;color:inherit;border:1px solid var(--line);border-radius:9px;padding:4px 8px;vertical-align:middle;background:#fff;outline:none;box-shadow:none}
    .job-date-input:focus{outline:3px solid rgba(37,99,235,.18);border-color:var(--accent);box-shadow:none}

    button{border:0;border-radius:9px;padding:10px 14px;cursor:pointer;font-weight:700;background:var(--accent);color:#fff;min-height:40px;white-space:nowrap;font-size:14px;font-family:Arial, Helvetica, sans-serif;touch-action:manipulation}

    td.no-print button{min-height:28px;padding:4px 8px;border-radius:7px;font-size:12px;background:#fee2e2!important;color:#991b1b!important}

    body.printing #jobDate,body.printing #jobDate:focus,body.printing #jobDate:active{border:0!important;outline:0!important;box-shadow:none!important;background:transparent!important;padding:0!important;-webkit-appearance:none!important;appearance:none!important}

    @media print{

      th:nth-child(1), td:nth-child(1) { width:5%; }

      th:nth-child(3), td:nth-child(3) { width:8%; }
      th:nth-child(4), td:nth-child(4) { width:9%; }
      th:nth-child(5), td:nth-child(5) { width:9%; }
      th:nth-child(6), td:nth-child(6) { width:12%; }
      th:nth-child(7), td:nth-child(7) { width:10%; }
      th:nth-child(8), td:nth-child(8) { width:12%; }
      th:nth-child(9), td:nth-child(9) { width:14%; }

<body>
  <header>
    <h1>Сменное задание — <input id="jobDate" class="job-date-input" type="text" placeholder=""></h1>
    <div class="header-actions">
      <button onclick="window.print()">Печать</button>
      <button onclick="window.print()">Сохранить PDF</button>
      <button onclick="sendDocument()">Отправить</button>
      <button class="danger" onclick="clearAll()">Очистить</button>
    </div>
    <div class="print-note">Один клик — ввод. Enter — вниз. Tab — вправо. PDF создается автономно, без подключения к интернету.</div>
  </header>

  <div class="summary">
    <div class="card">Всего изделий: <b id="totalRows">0</b></div>
    <div class="card">Общая длина нитки: <b id="totalCord">0</b> метров</div>
    <div class="card">Общий метраж профиля: <b id="profileMeters">0</b> метров</div>
  </div>


  <div class="row-actions">
    <button type="button" onclick="addRow()">Добавить строку</button>
  </div>

  <div class="wrap">
    <table id="sheet">
      <thead>
        <tr>
          <th>№</th>
          <th>Ткань</th>
          <th>Номер</th>
          <th>Ширина</th>
          <th>Высота</th>
          <th>Профиль</th>
          <th>Складки</th>
          <th>Нитка</th>
          <th>Длина нитки</th>
          <th class="no-print">Удалить</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="shareMessage" class="share-message"></div>

<script>
const tbody = document.querySelector('#sheet tbody');

window.addEventListener('beforeprint', () => {
  document.body.classList.add('printing');
  const d = document.getElementById('jobDate');
  if (d) d.blur();
});

window.addEventListener('afterprint', () => {
  document.body.classList.remove('printing');
});


function format(n) {
  if (!isFinite(n)) return '';
  return Math.round(n * 100) / 100;
}

function num(v) {
  const n = parseFloat(String(v || '').replace(',', '.'));
  return isNaN(n) ? 0 : n;
}

function isCompleteProductRow(tr) {
  const requiredTextFields = ['fabric', 'number', 'profile', 'cord'];
  const textFilled = requiredTextFields.every(cls =>
    (tr.querySelector('.' + cls)?.value || '').trim() !== ''
  );

  const width = num(tr.querySelector('.width')?.value);
  const height = num(tr.querySelector('.height')?.value);

  return textFilled && width > 0 && height > 0;
}

function makeInput(type, className) {
  const input = document.createElement('input');

  // Для стабильного ввода на iOS/Android/Chrome используем text,
  // а цифровую клавиатуру включаем через inputMode.
  input.type = 'text';
  input.className = className;
  input.autocomplete = 'off';
  input.enterKeyHint = 'next';

  if (type === 'number') {
    input.inputMode = 'decimal';
    input.pattern = '[0-9]*[.,]?[0-9]*';
  }

  input.addEventListener('input', recalcAll);
  input.addEventListener('change', recalcAll);
  input.addEventListener('keydown', handleNavigation);
  input.addEventListener('keyup', recalcAll);

  return input;
}

function addCellInput(tr, className, value = '', type = 'text') {
  const td = document.createElement('td');
  const input = makeInput(type, className);
  input.value = value || '';

  // Координаты ячейки для надежной навигации стрелками
  input.dataset.i = tr.dataset.rowIndex || '0';
  input.dataset.k = className;

  td.appendChild(input);
  tr.appendChild(td);
}

function addRow(data = {}) {
  const tr = document.createElement('tr');
  tr.dataset.rowIndex = tbody.children.length;

  const no = document.createElement('td');
  no.className = 'row-no readonly';
  tr.appendChild(no);

  addCellInput(tr, 'fabric', data.fabric);
  addCellInput(tr, 'number', data.number);
  addCellInput(tr, 'width', data.width, 'number');
  addCellInput(tr, 'height', data.height, 'number');
  addCellInput(tr, 'profile', data.profile);

  const folds = document.createElement('td');
  folds.className = 'folds readonly';
  tr.appendChild(folds);

  addCellInput(tr, 'cord', data.cord);

  const cordLength = document.createElement('td');
  cordLength.className = 'cord-length readonly';
  tr.appendChild(cordLength);

  const del = document.createElement('td');
  del.className = 'no-print';

  const btn = document.createElement('button');
  btn.textContent = '×';
  btn.className = 'danger';
  btn.onclick = () => {
    tr.remove();
    recalcAll();
  };

  del.appendChild(btn);
  tr.appendChild(del);

  tbody.appendChild(tr);
  recalcAll();
}

function addRows(n) {
  for (let i = 0; i < n; i++) addRow();
}

function clearAll() {
  if (!confirm('Очистить весь расчет?')) return;

  localStorage.removeItem('plisseRows');
  localStorage.removeItem('plisseJobDate');

  const dateInput = document.getElementById('jobDate');
  if (dateInput) dateInput.value = '';

  tbody.innerHTML = '';
  addRows(20);
  recalcAll();
}

function editableInputs() {
  return [...tbody.querySelectorAll('input')];
}

function handleNavigation(e) {
  const currentInput = e.target;
  const row = currentInput.closest('tr');
  if (!row) return;

  const rows = [...tbody.children];
  const rowIndex = rows.indexOf(row);
  const cell = currentInput.closest('td');
  const colIndex = [...row.children].indexOf(cell);

  if (e.key === 'Enter') {
    e.preventDefault();

    if (rowIndex === rows.length - 1) {
      addRow();
    }

    const nextRow = tbody.children[rowIndex + 1];
    const nextInput = nextRow?.children[colIndex]?.querySelector('input');

    if (nextInput) {
      nextInput.focus();
      nextInput.select();
    }
  }

  if (e.key === 'Tab') {
    const fields = editableInputs();
    const index = fields.indexOf(currentInput);

    if (index >= 0 && index === fields.length - 1 && !e.shiftKey) {
      e.preventDefault();
      addRow();
      const next = editableInputs()[index + 1];

      if (next) {
        next.focus();
        next.select();
      }
    }
  }
}


const editableKeys = ['fabric', 'number', 'width', 'height', 'profile', 'cord'];

function focusSheetCell(rowIndex, key) {
  const next = document.querySelector(`input[data-i="${rowIndex}"][data-k="${key}"]`);

  if (next) {
    next.focus();
    next.select();
    return true;
  }

  return false;
}

document.addEventListener('keydown', e => {
  const t = e.target;

  if (!t.matches('input[data-i][data-k]')) return;

  const currentRow = Number(t.dataset.i);
  const currentKey = t.dataset.k;
  const currentCol = editableKeys.indexOf(currentKey);

  if (currentCol === -1) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();

    if (currentRow >= tbody.children.length - 1) {
      addRow();
    }

    focusSheetCell(Math.min(currentRow + 1, tbody.children.length - 1), currentKey);
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusSheetCell(Math.max(currentRow - 1, 0), currentKey);
    return;
  }

  if (e.key === 'ArrowRight') {
    e.preventDefault();
    focusSheetCell(currentRow, editableKeys[Math.min(currentCol + 1, editableKeys.length - 1)]);
    return;
  }

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    focusSheetCell(currentRow, editableKeys[Math.max(currentCol - 1, 0)]);
    return;
  }
});

// PDF включает все строки таблицы, включая пустые.
function recalcAll() {
  let totalCordCm = 0;
  let totalProfileCm = 0;

  const rows = [...tbody.querySelectorAll('tr')];

  rows.forEach((tr, i) => {
    tr.dataset.rowIndex = i;
    tr.querySelectorAll('input[data-k]').forEach(inp => {
      inp.dataset.i = i;
    });
    tr.querySelector('.row-no').textContent = i + 1;

    const width = num(tr.querySelector('.width')?.value);
    const height = num(tr.querySelector('.height')?.value);

    const folds = Math.round(height < 60 ? height / 2 : height / 2.2);
    const cordLengthCm = (width + width + height) * 2 + 30;

    tr.querySelector('.folds').textContent = height ? format(folds) : '';
    tr.querySelector('.cord-length').textContent = (width || height) ? format(cordLengthCm) : '';

    if (width || height) totalCordCm += cordLengthCm;
    if (width) totalProfileCm += width * 2;
  });

  const totalRowsEl = document.querySelector('#totalRows');
  const totalCordEl = document.querySelector('#totalCord');
  const profileMetersEl = document.querySelector('#profileMeters');

  if (totalRowsEl) {
    totalRowsEl.textContent = rows.filter(isCompleteProductRow).length;
  }

  if (totalCordEl) {
    totalCordEl.textContent = format(totalCordCm / 100) || '0';
  }

  if (profileMetersEl) {
    profileMetersEl.textContent = format(totalProfileCm / 100) || '0';
  }

  saveLocal();
}

function saveLocal() {
  const rows = [...tbody.querySelectorAll('tr')].map(tr => ({
    fabric: tr.querySelector('.fabric')?.value || '',
    number: tr.querySelector('.number')?.value || '',
    width: tr.querySelector('.width')?.value || '',
    height: tr.querySelector('.height')?.value || '',
    profile: tr.querySelector('.profile')?.value || '',
    cord: tr.querySelector('.cord')?.value || ''
  }));

  localStorage.setItem('plisseRows', JSON.stringify(rows));
}

function loadLocal() {
  const saved = localStorage.getItem('plisseRows');

  if (saved) {
    try {
      const rows = JSON.parse(saved);
      if (Array.isArray(rows) && rows.length) {
        rows.forEach(addRow);
        return;
      }
    } catch {}
  }

  addRows(20);
}

function escapeHtml(v) {
  return String(v ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;');
}

function showShareMessage(text) {
  const box = document.querySelector('#shareMessage');

  if (!box) {
    alert(text);
    return;
  }

  box.textContent = text;
  box.classList.add('show');

  clearTimeout(window.__shareMsgTimer);
  window.__shareMsgTimer = setTimeout(() => box.classList.remove('show'), 4500);
}







function getRowsForPdfCanvas() {
  recalcAll();
  const rows = [...tbody.querySelectorAll('tr')].map((tr, i) => [
      String(i + 1),
      tr.querySelector('.fabric')?.value || '',
      tr.querySelector('.number')?.value || '',
      tr.querySelector('.width')?.value || '',
      tr.querySelector('.height')?.value || '',
      tr.querySelector('.profile')?.value || '',
      tr.querySelector('.folds')?.textContent || '',
      tr.querySelector('.cord')?.value || '',
      tr.querySelector('.cord-length')?.textContent || ''
    ]);
  return rows.length ? rows : [['', '', '', '', '', '', '', '', '']];
}

function canvasToJpegBytes(canvas, quality = 0.92) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => {
      if (!blob) return reject(new Error('Canvas toBlob failed'));
      blob.arrayBuffer().then(buf => resolve(new Uint8Array(buf))).catch(reject);
    }, 'image/jpeg', quality);
  });
}

function drawWrappedText(ctx, text, x, y, maxWidth, lineHeight, maxLines = 1) {
  const words = String(text || '').split(/\s+/);
  let line = '';
  let lines = [];
  for (let i = 0; i < words.length; i++) {
    const test = line ? line + ' ' + words[i] : words[i];
    if (ctx.measureText(test).width > maxWidth && line) {
      lines.push(line);
      line = words[i];
      if (lines.length >= maxLines) break;
    } else {
      line = test;
    }
  }
  if (lines.length < maxLines && line) lines.push(line);
  lines = lines.slice(0, maxLines);
  lines.forEach((l, idx) => ctx.fillText(l, x, y + idx * lineHeight));
}

async function createPdfBlobFromCanvasPages() {
  const rows = getRowsForPdfCanvas();
  const headers = ['№', 'Ткань', 'Номер', 'Ширина', 'Высота', 'Профиль', 'Складки', 'Нитка', 'Длина\nнитки'];
  const dateValue = (document.getElementById('jobDate')?.value || '').trim();
  const title = 'Сменное задание — ' + dateValue;

  // A4 portrait at 150 DPI. Text is rendered as an image, so Cyrillic works offline.
  const canvasW = 1240;
  const canvasH = 1754;
  const pageW = 595.28;
  const pageH = 841.89;
  const margin = 44;
  const titleY = 54;
  const dateY = 82;
  const tableTop = 138;
  const rowH = 30;
  const headerH = 34;
  const bottom = 44;
  const rowsPerPage = Math.max(1, Math.floor((canvasH - tableTop - headerH - bottom) / rowH));
  const colW = [52, 172, 84, 88, 88, 132, 96, 118, 146];
  const tableW = colW.reduce((a,b)=>a+b,0);

  const chunks = [];
  for (let i = 0; i < rows.length; i += rowsPerPage) chunks.push(rows.slice(i, i + rowsPerPage));
  if (!chunks.length) chunks.push([]);

  const images = [];

  for (let p = 0; p < chunks.length; p++) {
    const canvas = document.createElement('canvas');
    canvas.width = canvasW;
    canvas.height = canvasH;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvasW, canvasH);
    ctx.fillStyle = '#000000';
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 2;
    ctx.textBaseline = 'middle';

    ctx.font = 'bold 38px "Times New Roman", Times, serif';
    ctx.textAlign = 'left';
    ctx.fillText(title, margin, titleY);

    ctx.font = '20px "Times New Roman", Times, serif';
    ctx.fillText('Сформировано: ' + new Date().toLocaleString('ru-RU'), margin, dateY);
    ctx.fillText('Всего изделий: ' + (document.getElementById('totalRows')?.textContent || '0') + '    Общая длина нитки: ' + (document.getElementById('totalCord')?.textContent || '0') + ' метров    Общий метраж профиля: ' + (document.getElementById('profileMeters')?.textContent || '0') + ' метров', margin, dateY + 30);

    let y = tableTop;
    let x = margin;

    ctx.fillStyle = '#eeeeee';
    ctx.fillRect(margin, y, tableW, headerH);
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 24px "Times New Roman", Times, serif';
    ctx.textAlign = 'center';

    headers.forEach((h, ci) => {
      ctx.strokeRect(x, y, colW[ci], headerH);
      ctx.fillText(h, x + colW[ci]/2, y + headerH/2);
      x += colW[ci];
    });

    y += headerH;
    ctx.font = '24px "Times New Roman", Times, serif';

    chunks[p].forEach(row => {
      x = margin;
      row.forEach((value, ci) => {
        ctx.strokeRect(x, y, colW[ci], rowH);
        ctx.save();
        ctx.beginPath();
        ctx.rect(x + 2, y + 2, colW[ci] - 4, rowH - 4);
        ctx.clip();
        ctx.fillStyle = '#000000';
        ctx.textAlign = 'center';
        drawWrappedText(ctx, value, x + colW[ci]/2, y + rowH/2, colW[ci] - 8, 24, 1);
        ctx.restore();
        x += colW[ci];
      });
      y += rowH;
    });

    ctx.font = '18px "Times New Roman", Times, serif';
    ctx.textAlign = 'right';
    ctx.fillText((p + 1) + '/' + chunks.length, canvasW - margin, canvasH - 24);

    images.push(await canvasToJpegBytes(canvas));
  }

  return buildPdfWithJpegPages(images, canvasW, canvasH, pageW, pageH);
}

function encodeAscii(str) {
  return new TextEncoder().encode(str);
}

function concatUint8(parts) {
  const total = parts.reduce((sum, p) => sum + p.length, 0);
  const out = new Uint8Array(total);
  let offset = 0;
  parts.forEach(p => { out.set(p, offset); offset += p.length; });
  return out;
}

function buildPdfWithJpegPages(jpegPages, imgW, imgH, pageW, pageH) {
  const parts = [];
  const offsets = [0];
  let pos = 0;
  const objects = [];

  function addPart(part) {
    parts.push(part);
    pos += part.length;
  }
  function addObj(contentParts) {
    objects.push(contentParts);
    return objects.length;
  }

  const pageObjNums = [];
  jpegPages.forEach((jpg, idx) => {
    const imgObj = addObj([
      encodeAscii('<< /Type /XObject /Subtype /Image /Width ' + imgW + ' /Height ' + imgH + ' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ' + jpg.length + ' >>\nstream\n'),
      jpg,
      encodeAscii('\nendstream')
    ]);
    const content = 'q\n' + pageW + ' 0 0 ' + pageH + ' 0 0 cm\n/Im' + idx + ' Do\nQ\n';
    const contentObj = addObj([encodeAscii('<< /Length ' + content.length + ' >>\nstream\n' + content + 'endstream')]);
    const pageObj = addObj([encodeAscii('<< /Type /Page /Parent 0 0 R /MediaBox [0 0 ' + pageW + ' ' + pageH + '] /Resources << /XObject << /Im' + idx + ' ' + imgObj + ' 0 R >> >> /Contents ' + contentObj + ' 0 R >>')]);
    pageObjNums.push(pageObj);
  });

  const pagesObj = addObj([encodeAscii('<< /Type /Pages /Count ' + pageObjNums.length + ' /Kids [' + pageObjNums.map(n => n + ' 0 R').join(' ') + '] >>')]);
  pageObjNums.forEach(n => {
    const s = new TextDecoder().decode(objects[n - 1][0]).replace('/Parent 0 0 R', '/Parent ' + pagesObj + ' 0 R');
    objects[n - 1] = [encodeAscii(s)];
  });
  const catalogObj = addObj([encodeAscii('<< /Type /Catalog /Pages ' + pagesObj + ' 0 R >>')]);

  addPart(encodeAscii('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n'));
  objects.forEach((objParts, i) => {
    offsets.push(pos);
    addPart(encodeAscii((i + 1) + ' 0 obj\n'));
    objParts.forEach(addPart);
    addPart(encodeAscii('\nendobj\n'));
  });

  const xref = pos;
  addPart(encodeAscii('xref\n0 ' + (objects.length + 1) + '\n'));
  addPart(encodeAscii('0000000000 65535 f \n'));
  offsets.slice(1).forEach(off => addPart(encodeAscii(String(off).padStart(10, '0') + ' 00000 n \n')));
  addPart(encodeAscii('trailer\n<< /Size ' + (objects.length + 1) + ' /Root ' + catalogObj + ' 0 R >>\nstartxref\n' + xref + '\n%%EOF'));

  const pdfBytes = concatUint8(parts);
  return new Blob([pdfBytes], { type: 'application/pdf' });
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.rel = 'noopener';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 3000);
}

async function sendDocument() {
  const btn = document.querySelector('button[onclick="sendDocument()"]');
  const filename = 'smennoe-zadanie-plisse.pdf';

  if (btn) {
    btn.disabled = true;
    btn.textContent = 'Создание PDF...';
  }

  try {
    const blob = await createPdfBlobFromCanvasPages();
    const file = new File([blob], filename, { type: 'application/pdf' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          title: 'Сменное задание — Плиссе',
          text: 'PDF-файл сменного задания',
          files: [file]
        });
        return;
      } catch (shareErr) {
        if (shareErr && shareErr.name === 'AbortError') return;
      }
    }

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isIOS) {
      const url = URL.createObjectURL(blob);
      const opened = window.open(url, '_blank');
      if (opened) {
        showShareMessage('PDF открыт. Нажмите «Поделиться» в Safari и выберите WhatsApp или Telegram.');
        setTimeout(() => URL.revokeObjectURL(url), 60000);
        return;
      }
    }

    downloadBlob(blob, filename);
    showShareMessage('PDF скачан. Отправьте его через WhatsApp или Telegram вручную.');
  } catch (err) {
    console.error(err);
    alert('Не удалось создать PDF. Попробуйте кнопку «Сохранить PDF» через печать.');
  } finally {
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Отправить';
    }
  }
}
